# .github/workflows/move-root-to-bot-1_alerts.yml
name: Move Root Files to bot-1_alerts

on:
  workflow_dispatch:

jobs:
  move-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create bot-1_alerts folder
        run: mkdir -p bot-1_alerts

      - name: Move all files and folders to bot-1_alerts (except .git and bot-1_alerts)
        run: |
          shopt -s extglob
          mv !(bot-1_alerts|.git|.github) bot-1_alerts/ || true
          # Move .github as well, but keep workflows
          cp -r .github bot-1_alerts/
          rm -rf .github

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Move all root files and folders into bot-1_alerts"
          git push
